<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VentilSim"/>
<meta name="theme-color" content="#04070f"/>
<title>VentilSim v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cyan:#00e5ff;--green:#00e676;--pink:#ff6d9d;--amber:#ffca28;--red:#ff5252;--orange:#ff9800;--purple:#ce93d8;
  --bg:#04070f;--bg2:#060b16;--bg3:#030610;--bg4:#040810;
  --border:#0a1828;--border2:#0d2035;
  --text:#c5cfe0;--muted:#607080;--dim:#1e3a52;--dimmer:#0a2030
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.logo{font-family:monospace;font-size:15px;font-weight:700;color:var(--cyan);letter-spacing:4px}
.logo span{color:#1a3050;font-weight:300}
.subtitle{font-size:8px;color:#1a3050;letter-spacing:2px;margin-top:2px;font-family:monospace}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-family:monospace;font-size:8px;letter-spacing:1.5px;padding:3px 8px;border-radius:2px}
.b-cyan{background:#00e5ff10;border:1px solid #00e5ff30;color:var(--cyan)}
.b-red{background:#ff525210;border:1px solid #ff525230;color:var(--red)}
.b-amber{background:#ffca2810;border:1px solid #ffca2830;color:var(--amber)}
.b-purple{background:#ce93d810;border:1px solid #ce93d830;color:var(--purple)}
.tabbar{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{padding:10px 12px;font-family:monospace;font-size:9px;letter-spacing:1.5px;color:#2a4060;background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;flex-shrink:0}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.toolbar{padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.toolrow{display:flex;gap:12px;flex-wrap:wrap}
.toolgrp{flex:1;min-width:140px}
.lbl{font-family:monospace;font-size:8px;letter-spacing:2px;color:#2a4060;margin-bottom:6px}
.btnrow{display:flex;gap:4px}
.btn{flex:1;padding:7px 4px;font-family:monospace;font-size:9px;letter-spacing:.5px;background:transparent;border:1px solid #0e1e30;color:#2a4060;cursor:pointer;border-radius:3px;transition:all .15s;min-width:0}
.btn:active{transform:scale(.97)}
.btn.ac{background:#00e5ff12;border-color:#00e5ff40;color:var(--cyan)}
.btn.ag{background:#00e67612;border-color:#00e67640;color:var(--green)}
.btn.ap{background:#ff6d9d12;border-color:#ff6d9d40;color:var(--pink)}
.btn.aa{background:#ffca2812;border-color:#ffca2840;color:var(--amber)}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
@media(max-width:640px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.g3,.g4{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:14px;margin-bottom:12px}
.ct{font-family:monospace;font-size:8px;letter-spacing:3px;color:var(--cyan);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px}
.mbox{background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:8px 6px;text-align:center}
.mbox.warn{border-color:#ff525230;background:#ff52520a}
.mbox.caut{border-color:#ffca2830;background:#ffca280a}
.mbox.ok{border-color:#00e67630;background:#00e6760a}
.mv{font-family:monospace;font-size:20px;font-weight:700;line-height:1}
.ml{font-family:monospace;font-size:7px;letter-spacing:1px;color:#2a4060;margin-top:4px}
.mu{font-family:monospace;font-size:7px;color:#1a3050;margin-top:1px}
.al{border-radius:3px;padding:8px 12px;margin-bottom:8px;font-size:10px;line-height:1.7}
.a-d{background:#ff52520a;border:1px solid #ff525228;color:#ff7070}
.a-w{background:#ffca280a;border:1px solid #ffca2828;color:var(--amber)}
.a-i{background:#00e5ff0a;border:1px solid #00e5ff20;color:#60c8e0}
.a-g{background:#00e6760a;border:1px solid #00e67628;color:#60d090}
.a-p{background:#ce93d80a;border:1px solid #ce93d828;color:var(--purple)}
.chan{margin-bottom:8px}
.ch{display:flex;justify-content:space-between;margin-bottom:3px}
.cl{font-family:monospace;font-size:8px;letter-spacing:2px;color:#2a4060}
.cu{font-family:monospace;font-size:8px}
canvas.wave{display:block;width:100%;height:80px;background:#030811;border-radius:3px;border:1px solid #080f1e}
canvas.capno{display:block;width:100%;height:100px;background:#030811;border-radius:3px;border:1px solid #080f1e}
.sr{margin-bottom:12px}
.sh{display:flex;justify-content:space-between;margin-bottom:4px}
.sn{font-size:10px;color:var(--muted)}
.sv{font-family:monospace;font-size:12px;font-weight:700}
input[type=range]{width:100%;cursor:pointer;height:20px;accent-color:var(--cyan)}
.hint{font-size:8px;color:#1a3050;margin-top:2px;line-height:1.5}
select,input[type=number]{background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:3px;font-size:11px;font-family:monospace;width:100%;-webkit-appearance:none}
.cbtn{background:var(--cyan);color:#030810;border:none;padding:9px 18px;border-radius:3px;font-family:monospace;font-size:9px;letter-spacing:2px;font-weight:700;cursor:pointer}
.cbtn2{background:transparent;color:var(--green);border:1px solid #00e67640;padding:9px 18px;border-radius:3px;font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer}
.cbtn3{background:transparent;color:var(--amber);border:1px solid #ffca2840;padding:9px 18px;border-radius:3px;font-family:monospace;font-size:9px;letter-spacing:2px;cursor:pointer}
.abadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:2px;font-family:monospace;font-size:9px;margin:2px 4px 2px 0}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.acard{border-radius:5px;padding:12px;margin-bottom:10px;border:1px solid var(--border);background:var(--bg2)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
@media(max-width:480px){.agrid{grid-template-columns:1fr}}
.ablbl{font-family:monospace;font-size:7px;letter-spacing:2px;color:#2a4060;margin-bottom:3px}
.abval{font-size:10px;color:#7090a8;line-height:1.6}
/* FICHES */
.fiche-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fnav-btn{padding:6px 12px;font-family:monospace;font-size:9px;letter-spacing:1px;background:var(--bg4);border:1px solid var(--border);color:#2a4060;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.fnav-btn.active{background:#00e5ff12;border-color:#00e5ff40;color:var(--cyan)}
.fiche h2{font-size:13px;font-weight:600;color:var(--cyan);margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-family:monospace;letter-spacing:2px}
.fiche h3{font-size:11px;font-weight:600;color:#80b0c8;margin:14px 0 8px;font-family:monospace;letter-spacing:1px}
.fiche p{font-size:11px;color:#8090a0;line-height:1.8;margin-bottom:8px}
.fiche ul{padding-left:16px;margin-bottom:8px}
.fiche li{font-size:11px;color:#8090a0;line-height:1.8;margin-bottom:2px}
.fiche li::marker{color:var(--cyan)}
.fiche strong{color:var(--text);font-weight:600}
.fiche em{color:var(--amber);font-style:normal}
.fbox{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:10px 14px;margin:10px 0;font-family:monospace;font-size:10px;line-height:2}
.fbox .f-title{font-size:8px;letter-spacing:2px;color:#2a4060;margin-bottom:6px}
.fbox .eq{color:var(--cyan)}
.fbox .eq2{color:var(--green)}
.fbox .eq3{color:var(--pink)}
.fbox .eq4{color:var(--amber)}
.fbox .comment{color:var(--dim);font-size:9px}
.kv{width:100%;border-collapse:collapse;margin:8px 0 12px;font-size:10px}
.kv td{padding:5px 8px;border-bottom:1px solid var(--border)}
.kv td:first-child{color:#2a4060;font-family:monospace;letter-spacing:.5px;width:42%}
.kv td:last-child{color:var(--text)}
.kv tr:last-child td{border-bottom:none}
.memo{background:#00e5ff08;border:1px solid #00e5ff20;border-left:3px solid var(--cyan);border-radius:0 3px 3px 0;padding:10px 12px;margin:10px 0;font-size:10px;color:#70a8b8;line-height:1.8}
.memo .memo-title{font-family:monospace;font-size:8px;letter-spacing:2px;color:var(--cyan);margin-bottom:5px}
.warn-box{background:#ff52520a;border:1px solid #ff525225;border-left:3px solid var(--red);border-radius:0 3px 3px 0;padding:10px 12px;margin:10px 0;font-size:10px;color:#c07070;line-height:1.8}
.warn-box .wb-title{font-family:monospace;font-size:8px;letter-spacing:2px;color:var(--red);margin-bottom:5px}
.ok-box{background:#00e6760a;border:1px solid #00e67625;border-left:3px solid var(--green);border-radius:0 3px 3px 0;padding:10px 12px;margin:10px 0;font-size:10px;color:#70a888;line-height:1.8}
.amber-box{background:#ffca280a;border:1px solid #ffca2825;border-left:3px solid var(--amber);border-radius:0 3px 3px 0;padding:10px 12px;margin:10px 0;font-size:10px;color:#a09060;line-height:1.8}
.purple-box{background:#ce93d80a;border:1px solid #ce93d825;border-left:3px solid var(--purple);border-radius:0 3px 3px 0;padding:10px 12px;margin:10px 0;font-size:10px;color:#9070a0;line-height:1.8}
.vn{display:inline-block;background:#00e5ff10;border:1px solid #00e5ff25;color:var(--cyan);font-family:monospace;font-size:9px;padding:1px 7px;border-radius:2px;margin:1px}
.vp{display:inline-block;background:#ff52520f;border:1px solid #ff525225;color:#ff7070;font-family:monospace;font-size:9px;padding:1px 7px;border-radius:2px;margin:1px}
/* ISR DRUG CARD */
.drug-card{border-radius:5px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.drug-name{font-family:monospace;font-size:12px;font-weight:700;margin-bottom:6px}
.drug-dose{font-family:monospace;font-size:18px;font-weight:700;color:var(--cyan)}
.drug-vol{font-family:monospace;font-size:11px;color:var(--green);margin-top:2px}
.drug-note{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.5}
.step-badge{display:inline-block;font-family:monospace;font-size:8px;letter-spacing:1px;padding:2px 8px;border-radius:2px;margin-bottom:6px}
/* CAPNO */
.capno-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.capno-btn{padding:5px 10px;font-family:monospace;font-size:9px;background:var(--bg4);border:1px solid var(--border);color:#2a4060;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap}
.capno-btn.active{background:#00e67612;border-color:#00e67640;color:var(--green)}
/* PWA */
#pwa-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a1828;border:1px solid #00e5ff30;color:var(--cyan);padding:10px 18px;border-radius:4px;font-family:monospace;font-size:10px;letter-spacing:1px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#pwa-toast.show{opacity:1}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.01) 2px,rgba(0,229,255,.01) 4px);pointer-events:none;z-index:9999}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="logo">VENTIL<span>SIM</span></div>
      <div class="subtitle">SIMULATEUR · EIVASION UPEC · SAMU</div>
    </div>
    <div class="badges" id="hdr-badges"></div>
  </header>
  <div class="tabbar" id="tabbar">
    <button class="tab active" data-tab="courbes">COURBES</button>
    <button class="tab" data-tab="capno">CAPNO</button>
    <button class="tab" data-tab="isr">🚑 ISR</button>
    <button class="tab" data-tab="params">PARAMS</button>
    <button class="tab" data-tab="calcul">CALCUL</button>
    <button class="tab" data-tab="async">ASYNCH</button>
    <button class="tab" data-tab="fiches">📖 FICHES</button>
    <button class="tab" data-tab="pharmaco">💊 PHARMACO</button>
  </div>
  <div class="toolbar" id="toolbar-wrap">
    <div class="toolrow">
      <div class="toolgrp">
        <div class="lbl">MODE VENTILATOIRE</div>
        <div class="btnrow" id="mode-btns">
          <button class="btn ac" data-mode="vcv">📐 VCV</button>
          <button class="btn" data-mode="vaci">🔄 VACI</button>
          <button class="btn" data-mode="vsai">💨 VSAI</button>
        </div>
      </div>
      <div class="toolgrp">
        <div class="lbl">SCÉNARIO CLINIQUE</div>
        <div class="btnrow" id="scen-btns">
          <button class="btn ac" data-scen="normal">🫁 Sain</button>
          <button class="btn" data-scen="sdra">🔴 SDRA</button>
          <button class="btn" data-scen="bpco">🟡 BPCO</button>
        </div>
      </div>
    </div>
  </div>
  <main id="main-content"></main>
</div>
<div id="pwa-toast"></div>
<script>
// ═══════════════════════════════════════════════════
// DONNÉES
// ═══════════════════════════════════════════════════
const SC={
  normal:{label:"Poumon sain",C:60,R:8,peep:5,color:"#00e5ff",bcls:"b-cyan",bcls2:"ac",etco2_base:38,desc:"Mécanique ventilatoire normale.",triggers:{freq:.1,effort:"faible"}},
  sdra:{label:"SDRA modéré",C:25,R:12,peep:10,color:"#ff5252",bcls:"b-red",bcls2:"aa",etco2_base:32,desc:"Berlin 2012. Compliance ↓↓, hypoxémie réfractaire.",triggers:{freq:.3,effort:"intense"}},
  bpco:{label:"BPCO décomp.",C:80,R:25,peep:5,color:"#ffca28",bcls:"b-amber",bcls2:"aa",etco2_base:52,desc:"Obstruction bronchique majeure, τ élevée.",triggers:{freq:.4,effort:"modéré"}}
};
const MD={
  vcv:{label:"VCV",color:"#00e5ff",acls:"ac",full:"Ventilation Contrôlée en Volume",
    desc:"Volume courant imposé. Pression résultante. Débit carré. Plateau télé-inspiratoire.",
    mooc:"Sem. 2 — Pcrete = résistive (R×Flow) + élastique (Vt/C) + PEEP."},
  vaci:{label:"VAC/VACI",color:"#00e676",acls:"ag",full:"Ventilation Assistée Contrôlée / Intermittente",
    desc:"Cycles contrôlés garantis + cycles spontanés intercalés. Transition vers sevrage.",
    mooc:"Sem. 3 — Maintien du drive respiratoire, prévention atrophie diaphragmatique."},
  vsai:{label:"VSAI/AI",color:"#ff6d9d",acls:"ap",full:"Ventilation Spontanée avec Aide Inspiratoire",
    desc:"Chaque cycle déclenché par le patient. Plateau = PEEP + PS. Mode de sevrage.",
    mooc:"Sem. 4 — Sevrage progressif : PS 20→15→12→8→5. Extubation si PS ≤ 7 cmH₂O."}
};

// ISR — protocoles drogues
const ISR_PROTOCOLS={
  etomidate_succinyl:{
    label:"Étomidate + Succinylcholine",color:"#00e5ff",
    context:"Protocole standard SAMU France. Patient neurologique, hémodynamique stable.",
    steps:[
      {step:"PRÉMÉDICATION",color:"#ce93d8",drugs:[
        {name:"Atropine",dose_pkg:0.01,max:0.5,unit:"mg",conc:0.5,conc_unit:"mg/mL",note:"Si bradycardie anticipée ou enfant. Optionnel adulte."},
        {name:"Fentanyl",dose_pkg:2,max:150,unit:"µg",conc:50,conc_unit:"µg/mL",note:"Prémédication analgésique 3 min avant. Atténue la réponse sympathique à l'intubation."}
      ]},
      {step:"INDUCTION",color:"#00e5ff",drugs:[
        {name:"Étomidate",dose_pkg:0.3,max:20,unit:"mg",conc:2,conc_unit:"mg/mL",note:"Stabilité hémodynamique ++. Attention : inhibition corticosurrénalienne (dose unique acceptable)."}
      ]},
      {step:"CURARE",color:"#ff6d9d",drugs:[
        {name:"Succinylcholine",dose_pkg:1.5,max:150,unit:"mg",conc:50,conc_unit:"mg/mL",note:"Délai d'action 45-60s. Contre-indications : hyperkaliémie, brûlé >48h, alité >72h, trauma médullaire."}
      ]},
      {step:"ENTRETIEN",color:"#00e676",drugs:[
        {name:"Midazolam",dose_pkg:0.05,max:5,unit:"mg",conc:5,conc_unit:"mg/mL",note:"Sédation post-intubation. Titrer par bolus de 1mg."},
        {name:"Morphine",dose_pkg:0.1,max:10,unit:"mg",conc:1,conc_unit:"mg/mL",note:"Analgésie post-intubation. Titrer."}
      ]}
    ]
  },
  ketamine_succinyl:{
    label:"Kétamine + Succinylcholine",color:"#ffca28",
    context:"Patient instable, état de choc, bronchospasme, asthme. Maintien du tonus sympathique.",
    steps:[
      {step:"INDUCTION",color:"#ffca28",drugs:[
        {name:"Kétamine",dose_pkg:1.5,max:150,unit:"mg",conc:50,conc_unit:"mg/mL",note:"Bronchodilatateur, maintien PA. Attention : HTIC (augmente PIC), psychoses actives. 2 mg/kg si choc sévère."}
      ]},
      {step:"CURARE",color:"#ff6d9d",drugs:[
        {name:"Succinylcholine",dose_pkg:1.5,max:150,unit:"mg",conc:50,conc_unit:"mg/mL",note:"Mêmes contre-indications. Délai 45-60s."}
      ]},
      {step:"ENTRETIEN",color:"#00e676",drugs:[
        {name:"Kétamine IVSE",dose_pkg:1,max:null,unit:"mg/kg/h",conc:null,conc_unit:null,note:"Sédation-analgésie par IVSE. Idéal en préhospitalier (pas de dépression HD)."},
        {name:"Midazolam",dose_pkg:0.05,max:5,unit:"mg",conc:5,conc_unit:"mg/mL",note:"Adjuvant sédatif si besoin."}
      ]}
    ]
  },
  propofol_roc:{
    label:"Propofol + Rocuronium",color:"#ce93d8",
    context:"Bloc opératoire, patient stable, estomac vide. Exceptionnel en préhospitalier.",
    steps:[
      {step:"INDUCTION",color:"#ce93d8",drugs:[
        {name:"Propofol",dose_pkg:2,max:200,unit:"mg",conc:10,conc_unit:"mg/mL",note:"Dépression HD ! Réduire à 1 mg/kg si instable. Éviter en préhospitalier."}
      ]},
      {step:"CURARE",color:"#ff6d9d",drugs:[
        {name:"Rocuronium",dose_pkg:1.2,max:120,unit:"mg",conc:10,conc_unit:"mg/mL",note:"ISR haute dose. Délai 60s. Réversible par sugammadex."}
      ]},
      {step:"REVERSAL",color:"#00e676",drugs:[
        {name:"Sugammadex",dose_pkg:16,max:200,unit:"mg",conc:200,conc_unit:"mg/mL",note:"Inversion immédiate rocuronium en cas d'impossibilité d'intuber/ventiler (CICV). 16 mg/kg."}
      ]},
      {step:"ENTRETIEN",color:"#00e676",drugs:[
        {name:"Propofol IVSE",dose_pkg:null,max:null,unit:"3-6 mg/kg/h",conc:null,conc_unit:null,note:"Sédation continue IVSE bloc op."}
      ]}
    ]
  }
};

// MACOCHA score
const MACOCHA_ITEMS=[
  {id:"m1",label:"Mallampati III ou IV",pts:5},
  {id:"m2",label:"Pathologie cervicale (instabilité, ankylose, halo)",pts:5},
  {id:"m3",label:"Ouverture de bouche < 3 cm",pts:3},
  {id:"m4",label:"Apnée du sommeil / ronflement",pts:2},
  {id:"m5",label:"Réduction mobilité mandibule",pts:1},
  {id:"m6",label:"Absence de dents",pts:1},
  {id:"m7",label:"SpO₂ < 80% avant intubation",pts:1},
  {id:"m8",label:"Anesthésiste non entraîné",pts:1},
];

// CAPNOGRAPHIE — profils
const CAPNO_PROFILES={
  normal:{label:"Normale",color:"#00e676",
    etco2:38,desc:"Courbe en plateau bien défini. Phase I (débit mort anat.), phase II (mélange), phase III (plateau alvéolaire), descente verticale inspiration.",
    shape:"normal"},
  bronchospasme:{label:"Bronchospasme",color:"#ffca28",
    etco2:45,desc:"Signe du requin — phase III ascendante (pente positive). Obstruction bronchique, vidange alvéolaire hétérogène. BPCO, asthme.",
    shape:"shark"},
  oesophagien:{label:"Intubation œsophagienne",color:"#ff5252",

const S={
  mode:"vcv",scen:"normal",tab:"courbes",
  vt:500,fr:16,peep:5,ie:.4,fio2:40,ps:12,
  cTaille:170,cSexe:"H",cPath:"normal",cResult:null,
  fiche:"physio",

// ═══════════════════════════════════════════════════
// PHYSIO COURBES
// ═══════════════════════════════════════════════════
function genCurves(steps=280){
  const sc=SC[S.scen],C=sc.C,R=sc.R;
  const Tt=60/S.fr,Ti=Tt*S.ie,Te=Tt*(1-S.ie);
  const Vt=S.vt/1000,Fp=Vt/(Ti*.8);
  const P=[],Q=[],V=[],asyncs=[];
  for(let i=0;i<steps;i++){
    const t=(i/steps)*Tt,tc=t%Tt,insp=tc<Ti;
    let p,q,v;
    if(S.mode==="vcv"){
      if(insp){const tr=tc/Ti;if(tr<.8){q=Fp;v=q*tc;p=R*q+(v/(C/1000))+S.peep;}else{q=0;v=Vt;p=(Vt/(C/1000))+S.peep;}}
      else{const te=tc-Ti,tau=R*C/1000;v=Vt*Math.exp(-te/tau);q=-(Vt/tau)*Math.exp(-te/tau);p=(v/(C/1000))+S.peep;if(te>Te*.85&&v>.05*Vt&&R>20&&!asyncs.includes("auto-PEEP"))asyncs.push("auto-PEEP");}
    }else if(S.mode==="vaci"){
      const spon=Math.floor(t/Tt)%3===2;
      if(insp){const tr=tc/Ti;if(spon){q=Fp*Math.sin(Math.PI*tr);v=Vt*.7*tr;p=S.peep+(Vt*.7*tr/(C/1000))+R*q*.5;}else{q=tr<.8?Fp:0;v=q>0?q*tc:Vt;p=R*(q>0?q:0)+(Math.min(v,Vt)/(C/1000))+S.peep;}}
      else{const te=tc-Ti,tau=R*C/1000;v=Vt*Math.exp(-te/tau);q=-(Vt/tau)*Math.exp(-te/tau);p=(v/(C/1000))+S.peep;}
    }else{
      if(insp){const tr=tc/Ti;if(tr<.05){p=S.peep-(SC[S.scen].triggers.effort==="intense"?4:2);q=.1;v=0;if(SC[S.scen].triggers.effort==="intense"&&!asyncs.includes("double-trigger"))asyncs.push("double-trigger");}
      else{q=Fp*(1-tr)*2;v=Vt*(1-Math.exp(-3*tr));p=S.peep+S.ps;}
      if(SC[S.scen].triggers.freq<.15&&!asyncs.includes("non-trigger"))asyncs.push("non-trigger");}
      else{const te=tc-Ti,tau=R*C/1000;v=Vt*Math.exp(-te/tau);q=-(Vt/tau)*Math.exp(-te/tau);p=S.peep+Math.max(0,S.ps*Math.exp(-te*3));}
    }
    P.push(Math.max(S.peep-6,p||S.peep));Q.push((q||0)*60);V.push(Math.max(0,(v||0)*1000));
  }
  return{P,Q,V,asyncs};
}

function getMetrics(){
  const sc=SC[S.scen];
  const pplat=Math.round(S.vt/sc.C+S.peep);
  const pmax=Math.round(S.vt/sc.C+sc.R*(S.vt/1000/(S.fr/60*S.ie*.8))+S.peep);
  const drv=pplat-S.peep;
  const tau=sc.R*sc.C/1000;
  const te=(1-S.ie)/(S.fr/60);
  const autoP=sc.R>20&&te<tau*3;
  const ve=Math.round(S.vt*S.fr/100)/10;
  return{pplat,pmax,drv,autoP,ve,tau};
}

function drawWave(id,data,color){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||300,H=cv.clientHeight||80;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
  ctx.fillStyle="#030811";ctx.fillRect(0,0,W,H);
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pad=5,sy=v=>H-((v-mn)/rng)*(H-pad*2)-pad;
  ctx.strokeStyle="#0d1e30";ctx.lineWidth=.5;
  [.25,.5,.75].forEach(r=>{ctx.beginPath();ctx.moveTo(0,H*r);ctx.lineTo(W,H*r);ctx.stroke()});
  if(color==="#00e676"){const z=sy(0);ctx.strokeStyle="#1a2a40";ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(0,z);ctx.lineTo(W,z);ctx.stroke();ctx.setLineDash([]);}
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+"25");grad.addColorStop(1,color+"00");
  ctx.beginPath();data.forEach((v,i)=>{const x=(i/(data.length-1))*W,y=sy(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();data.forEach((v,i)=>{const x=(i/(data.length-1))*W,y=sy(v);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.lineJoin="round";ctx.stroke();
  ctx.font="500 8px monospace";ctx.fillStyle="#1e3a52";ctx.textAlign="right";
  ctx.fillText(Math.round(mx*10)/10,W-4,12);ctx.fillText(Math.round(mn*10)/10,W-4,H-3);
}

// CAPNOGRAPHIE — GÉNÉRATEUR DE COURBES

function drawCapno(id, profile){
  const cv=document.getElementById(id);if(!cv)return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||300,H=cv.clientHeight||100;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
  ctx.fillStyle="#030811";ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle="#0d1e30";ctx.lineWidth=.5;
  [.25,.5,.75].forEach(r=>{ctx.beginPath();ctx.moveTo(0,H*r);ctx.lineTo(W,H*r);ctx.stroke()});
  const p=CAPNO_PROFILES[profile];
  const color=p.color;
  const etco2=p.etco2;
  const CYCLES=3;
  const pts=[];
  const cw=W/CYCLES;
  // Ligne de base
  const baseline=H-8;
  const top=H-(etco2/60)*(H-20)-8;

  for(let c=0;c<CYCLES;c++){
    const x0=c*cw;
    if(profile==="zero"||profile==="disconnect"){
      // Ligne plate à 0
      pts.push([x0,baseline],[x0+cw,baseline]);
      if(profile==="disconnect"&&c===1){
        // Un seul cycle visible puis disparition
        pts.length=0;
        pts.push([0,baseline],[cw*0.6,baseline],[cw*0.6,top],[cw*0.85,top],[cw*0.85,baseline]);
        for(let i=cw;i<W;i+=2)pts.push([i,baseline]);
        break;
      }
    }else if(profile==="normal"){
      // Courbe capno normale : 4 phases
      pts.push(
        [x0,baseline],
        [x0+cw*.08,baseline],           // Phase I : débit mort
        [x0+cw*.22,top+8],              // Phase II : montée
        [x0+cw*.35,top],                // Phase III : plateau
        [x0+cw*.58,top],                // Fin plateau
        [x0+cw*.62,baseline],           // Descente inspiration
        [x0+cw,baseline]
      );
    }else if(profile==="shark"){
      // Signe du requin : phase III ascendante
      pts.push(
        [x0,baseline],
        [x0+cw*.08,baseline],
        [x0+cw*.22,top+12],
        [x0+cw*.35,top+6],
        [x0+cw*.58,top-4],             // Phase III montante ← signe requin
        [x0+cw*.62,baseline],
        [x0+cw,baseline]
      );
    }else if(profile==="low"){
      const t2=H-(etco2/60)*(H-20)-8;
      pts.push(
        [x0,baseline],
        [x0+cw*.08,baseline],
        [x0+cw*.22,t2+4],
        [x0+cw*.35,t2],
        [x0+cw*.58,t2],
        [x0+cw*.62,baseline],
        [x0+cw,baseline]
      );
    }else if(profile==="high"){
      const t2=H-(etco2/60)*(H-20)-8;
      pts.push(
        [x0,baseline],
        [x0+cw*.08,baseline],
        [x0+cw*.22,t2+4],
        [x0+cw*.35,t2],
        [x0+cw*.58,t2],
        [x0+cw*.62,baseline],
        [x0+cw,baseline]
      );
    }
  }

  if(pts.length>1){
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,color+"20");grad.addColorStop(1,color+"00");
    ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.lineTo(W,baseline);ctx.lineTo(0,baseline);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
  }

  // EtCO₂ label
  ctx.font="700 10px monospace";ctx.fillStyle=color;ctx.textAlign="left";
  ctx.fillText("EtCO₂ = "+etco2+" mmHg",8,16);
  // Baseline label
  ctx.font="500 8px monospace";ctx.fillStyle="#1e3a52";ctx.textAlign="left";
  ctx.fillText("0",4,baseline-2);
}

// ISR — CALCULATEUR

function calcDrug(drug, poids){
  if(!drug.dose_pkg) return null;
  const dose=Math.round(drug.dose_pkg*poids*10)/10;
  const dose_final=drug.max?Math.min(dose,drug.max):dose;
  const vol=drug.conc?Math.round((dose_final/drug.conc)*10)/10:null;
  return{dose:dose_final,vol};
}

function macochScore(){
  return MACOCHA_ITEMS.reduce((s,item)=>s+(S.isr_macocha[item.id]?item.pts:0),0);
}

// ═══════════════════════════════════════════════════
// CALCULS ARDSNet
// ═══════════════════════════════════════════════════
function calcPI(t,s){return s==="H"?50+.91*(t-152.4):45.5+.91*(t-152.4);}
function calcARDS(t,s,p){
  const pi=calcPI(t,s),sc=SC[p];
  const vpkg=p==="sdra"?6:8,vt=Math.round(pi*vpkg);
  const peep=p==="sdra"?10:p==="bpco"?4:5;
  const fr=Math.round((p==="bpco"?7000:9000)/vt);
  const pp=Math.round(vt/sc.C+peep),drv=pp-peep;
  return{pi:Math.round(pi*10)/10,vt,vpkg,fr,peep,pp,drv,rsbi:Math.round(fr/(vt/1000))};
}

function asyncBadge(type){
  const map={"auto-PEEP":["#ffca28","Auto-PEEP"],"double-trigger":["#ff5252","Double déclenchement"],"non-trigger":["#ff6d9d","Non-déclenchement"]};
  const[c,l]=map[type]||["#aaa",type];
  return`<span class="abadge" style="background:${c}10;border:1px solid ${c}40;color:${c}"><span class="dot" style="background:${c}"></span>${l}</span>`;
}
function mbox(val,lbl,unit,warn,caut,color){
  const cls=warn?"warn":caut?"caut":"",col=warn?"#ff5252":caut?"#ffca28":(color||"#00e5ff");
  return`<div class="mbox ${cls}"><div class="mv" style="color:${col}">${val}</div><div class="ml">${lbl}</div><div class="mu">${unit}</div></div>`;
}

const FICHES={
physio:`<h2>01 — BASES PHYSIOLOGIE VENTILATOIRE</h2>
<h3>Équation du mouvement</h3>
<div class="fbox"><div class="f-title">ÉQUATION DU MOUVEMENT</div><div class="eq">P = (V / C) + (R × Flow) + PEEP</div><div class="comment">V = volume mobilisé · C = compliance · R = résistance · Flow = débit</div></div>
<h3>Compliance (C)</h3>
<p><strong>Déformabilité du système respiratoire.</strong> Mesurée en pause télé-inspiratoire (débit = 0).</p>

<table class="kv">
  <tr><td>Normale</td><td><span class="vn">40–80 mL/cmH₂O</span></td></tr>
  <tr><td>SDRA sévère</td><td><span class="vp">&lt; 20 mL/cmH₂O</span></td></tr>
  <tr><td>BPCO emphysème</td><td><span class="vn">60–100 mL/cmH₂O</span></td></tr>
</table>
<h3>Résistance (R) & Constante de temps (τ)</h3>
<div class="fbox"><div class="eq3">τ = R × C</div><div class="comment">1τ = 63% expiré · 3τ = 95% · 5τ = 99%</div><div class="eq4">Te minimal = 3τ — Auto-PEEP si Te &lt; 3τ</div></div>

prehosp:`<h2>07 — VENTILATION PRÉHOSPITALIÈRE SAMU</h2>

<h3>Consommation O₂ — calcul pratique</h3>
<div class="fbox">
  <div class="f-title">AUTONOMIE BOUTEILLE</div>
  <div class="eq">Durée (min) = (Pression bar × Volume L) / (FiO₂ × FR × Vt L × 1.2)</div>
  <div class="comment">Bouteille 6L à 200 bar · FiO₂ 50% · FR 15 · Vt 0.5L</div>
  <div class="eq2">→ (200 × 6) / (0.5 × 15 × 0.5 × 1.2) = 267 min ≈ 4h30</div>
  <div class="comment">Toujours prévoir +50% de marge · Emporter double si transport long</div>
</div>
<h3>Arrêt cardiaque sous ventilation mécanique</h3>
<table class="kv">
  <tr><td>Fréquence</td><td><strong>10/min</strong> pendant MCE (éviter hyperventilation)</td></tr>
  <tr><td>Volume</td><td>Vt visible uniquement, pas de plateau thoracique</td></tr>
  <tr><td>PEEP</td><td>0 cmH₂O pendant l'ACR</td></tr>
  <tr><td>FiO₂</td><td>100%</td></tr>
  <tr><td>EtCO₂ MCE</td><td>&gt; 10 mmHg = qualité acceptable · Montée brutale = RACS</td></tr>
</table>
<div class="warn-box">
  <div class="wb-title">⚠ VENTILATION TRAUMATISÉ CRÂNIEN GRAVE (SMUR)</div>
  SpO₂ ≥ 95% (O₂ prioritaire) · EtCO₂ 35-40 mmHg (éviter hypo ET hypercapnie)<br>
  PAS ≥ 90 mmHg (noradrénaline si nécessaire)<br>
  Hyperventilation (EtCO₂ 30-35) uniquement si engagement transtentoriel actif
</div>
<h3>Intubation en conditions dégradées</h3>
<div class="amber-box">
  En préhospitalier, l'ISR doit être préparée <strong>avant</strong> toute tentative :<br>
  → Aspiration + BAVU + O₂ nasal haut débit à portée<br>
  → Kit coniotomie ouvert sur brancard<br>
  → Masque laryngé en sauvetage (i-gel ou LMA)<br>
  → Maximum <strong>2 tentatives laryngoscopie directe</strong> avant vidéolaryngoscope
</div>
<h3>Post-RACS en préhospitalier</h3>
<table class="kv">
  <tr><td>FiO₂</td><td>Titrer SpO₂ 94-98% — éviter hyperoxie (radicaux libres)</td></tr>
  <tr><td>EtCO₂</td><td>35-40 mmHg — normoventilation</td></tr>
  <tr><td>PEEP</td><td>5 cmH₂O · Ne pas augmenter si instable HD</td></tr>
  <tr><td>Température</td><td>Éviter fièvre &gt; 37.8°C (TTM 36°C dès que possible)</td></tr>
  <tr><td>PA cible</td><td>PAS ≥ 90 mmHg · Noradrénaline si choc post-RACS</td></tr>
</table>`
};

function renderFiches(){
  const nav=FICHE_LIST.map(f=>
    `<button class="fnav-btn${S.fiche===f.id?" active":""}" onclick="S.fiche='${f.id}';refresh()">${f.label}</button>`
  ).join("");
  return`<div class="fiche-nav">${nav}</div><div class="card fiche">${FICHES[S.fiche]||"Contenu à venir."}</div>`;
}

function refresh(){
  const sc=SC[S.scen],m=MD[S.mode];
  document.getElementById("hdr-badges").innerHTML=
    `<span class="badge ${sc.bcls}">${sc.label}</span><span class="badge b-cyan">${m.label}</span>`;
  const showToolbar=!["fiches","isr","capno","pharmaco"].includes(S.tab);
  document.getElementById("toolbar-wrap").style.display=showToolbar?"block":"none";
  const el=document.getElementById("main-content");
  if(S.tab==="courbes")     el.innerHTML=renderCourbes();
  else if(S.tab==="capno")  el.innerHTML=renderCapno();
  else if(S.tab==="isr")    el.innerHTML=renderISR();
  else if(S.tab==="params") el.innerHTML=renderParams();
  else if(S.tab==="calcul") el.innerHTML=renderCalc();
  else if(S.tab==="async")  el.innerHTML=renderAsync();
  else if(S.tab==="fiches") el.innerHTML=renderFiches();
  else if(S.tab==="pharmaco") el.innerHTML=renderPharmaco();

  if(S.tab==="courbes"){
    requestAnimationFrame(()=>{
      const d=genCurves();
      drawWave("cv-p",d.P,"#00e5ff");
      drawWave("cv-q",d.Q,"#00e676");
      drawWave("cv-v",d.V,"#ff6d9d");
    });
  }
  if(S.tab==="capno"){
    requestAnimationFrame(()=>drawCapno("cv-capno",S.capno_profile));
  }
}

document.getElementById("tabbar").addEventListener("click",e=>{
  const btn=e.target.closest("[data-tab]");if(!btn)return;
  S.tab=btn.dataset.tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  refresh();
});
document.getElementById("mode-btns").addEventListener("click",e=>{
  const btn=e.target.closest("[data-mode]");if(!btn)return;
  S.mode=btn.dataset.mode;
  document.querySelectorAll("#mode-btns .btn").forEach(b=>b.className="btn");
  btn.className="btn "+MD[S.mode].acls;
  refresh();
});
document.getElementById("scen-btns").addEventListener("click",e=>{
  const btn=e.target.closest("[data-scen]");if(!btn)return;
  S.scen=btn.dataset.scen;
  document.querySelectorAll("#scen-btns .btn").forEach(b=>b.className="btn");
  btn.className="btn "+SC[S.scen].bcls2;
  refresh();
});
window.addEventListener("resize",()=>{
  if(S.tab==="courbes")requestAnimationFrame(()=>{const d=genCurves();drawWave("cv-p",d.P,"#00e5ff");drawWave("cv-q",d.Q,"#00e676");drawWave("cv-v",d.V,"#ff6d9d");});
  if(S.tab==="capno")requestAnimationFrame(()=>drawCapno("cv-capno",S.capno_profile));
});

function toast(msg,dur=3500){const t=document.getElementById("pwa-toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),dur);}
if("serviceWorker" in navigator){
  const swCode=`const CACHE="ventilsim-v3";
self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([location.pathname])).catch(()=>{}));self.skipWaiting();});
self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));return res;}).catch(()=>caches.match(e.request))));});`;
  const blob=new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:"/"})
    .then(()=>{setTimeout(()=>toast("✓ Disponible hors ligne"),1500);}).catch(()=>{});
}

// ═══════════════════════════════════════════════════
// RENDU PHARMACO
// ═══════════════════════════════════════════════════
function renderPharmaco() {
  const cats = Object.keys(PHARMACO);
  if (!S.pharma_cat) S.pharma_cat = cats[0];
  if (!S.pharma_drug) S.pharma_drug = null;

  const cat = PHARMACO[S.pharma_cat];

  const catNav = cats.map(k => {
    const c = PHARMACO[k];
    return `<button class="capno-btn${S.pharma_cat===k?' active':''}"
      onclick="S.pharma_cat='${k}';S.pharma_drug=null;refresh()"
      style="border-color:${S.pharma_cat===k?c.color+'60':'var(--border)'};color:${S.pharma_cat===k?c.color:'#2a4060'}">
      ${c.icon} ${c.label}
    </button>`;
  }).join('');

  // Drug list
  const drugList = cat.drugs.map((d, i) => {
    const active = S.pharma_drug === i;
    return `<button onclick="S.pharma_drug=${active?'null':i};refresh()"
      style="display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:6px;
      background:${active?cat.color+'15':'var(--bg4)'};
      border:1px solid ${active?cat.color+'50':'var(--border)'};
      border-radius:4px;cursor:pointer;transition:all .15s;font-family:inherit">
      <div style="font-family:monospace;font-size:11px;font-weight:700;color:${active?cat.color:'var(--text)'}">
        ${d.name}
      </div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${d.specialite} · ${d.classe}</div>
    </button>`;
  }).join('');

  // Drug detail
  let detail = `<div style="display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--dim);font-family:monospace;font-size:10px;letter-spacing:2px;text-align:center">
    SÉLECTIONNER<br><span style="color:#0a2030">UNE MOLÉCULE</span>
  </div>`;

  if (S.pharma_drug !== null && cat.drugs[S.pharma_drug]) {
    const d = cat.drugs[S.pharma_drug];

    const ciHtml = (d.ci || []).map(c => {
      const isDanger = c.startsWith('⚠');
      return `<li style="color:${isDanger?'#ff7070':'#8090a0'};font-weight:${isDanger?'600':'400'}">${c}</li>`;
    }).join('');

    const avHtml = (d.avantages || []).map(a =>
      `<li style="color:#60d090">${a}</li>`
    ).join('');

    const inconvHtml = (d.inconvenients || []).map(a =>
      `<li style="color:#c09060">${a}</li>`
    ).join('');

    const dosesHtml = [
      ['Induction / ISR', d.dose_induction || d.dose_isr],
      ['ISR haute dose', d.dose_isr && d.name.includes('Rocuronium') ? d.dose_isr : null],
      ['Entretien IVSE', d.dose_entretien],
      ['Pré-médication', d.dose_premedicaton || d.dose_premedicaton],
      ['Status/Urgence', d.dose_status || d.dose_urgence || d.dose_cicv],
      ['Bloc profond', d.dose_profond],
      ['Bloc modéré', d.dose_modere || d.dose_routine],
      ['Dose max', d.dose_max],
      ['Titration', d.dose_titration],
      ['Charge', d.dose_charge],
      ['Délai action', d.delai],
      ['Durée action', d.duree],
    ].filter(([,v]) => v).map(([l,v]) =>
      `<tr><td>${l}</td><td style="color:var(--cyan);font-family:monospace">${v}</td></tr>`
    ).join('');

    detail = `
    <div style="font-family:monospace;font-size:11px;font-weight:700;color:${cat.color};margin-bottom:4px">${d.name}</div>
    <div style="font-size:9px;color:var(--muted);margin-bottom:12px">${d.specialite} · ${d.presentation}</div>

    <div style="font-size:9px;color:var(--dim);padding:8px 10px;background:#030810;border-radius:3px;border-left:2px solid ${cat.color}40;margin-bottom:12px;line-height:1.7">
      ${d.indication}
    </div>

    <div class="ct" style="margin-bottom:8px">DOSES</div>
    <table class="kv" style="margin-bottom:12px">${dosesHtml}</table>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div>
        <div class="ablbl" style="color:#00e67655;margin-bottom:4px">AVANTAGES</div>
        <ul style="padding-left:14px;font-size:10px;line-height:1.8">${avHtml}</ul>
      </div>
      <div>
        <div class="ablbl" style="color:#ff985555;margin-bottom:4px">INCONVÉNIENTS</div>
        <ul style="padding-left:14px;font-size:10px;line-height:1.8">${inconvHtml}</ul>
      </div>
    </div>

    <div class="ct" style="margin-bottom:8px;color:#ff5252">CONTRE-INDICATIONS</div>
    <ul style="padding-left:14px;font-size:10px;line-height:1.9;margin-bottom:12px">${ciHtml}</ul>

    <div style="background:#ff52520a;border:1px solid #ff525225;border-left:3px solid #ff5252;border-radius:0 3px 3px 0;padding:10px 12px;font-size:10px;color:#c07070;line-height:1.8;margin-bottom:10px">
      <div style="font-family:monospace;font-size:8px;letter-spacing:2px;color:#ff5252;margin-bottom:5px">⚠ PRÉCAUTIONS</div>
      ${d.precautions || '—'}
    </div>

    <div style="font-size:9px;color:var(--dim);padding:6px 10px;background:#030810;border-radius:3px;font-family:monospace">
      GROSSESSE : ${d.grossesse || 'Données insuffisantes'}
    </div>`;
  }

  return `
  <div class="capno-nav" style="margin-bottom:14px">${catNav}</div>
  <div class="g2">
    <div class="card" style="border-color:${cat.color}25">
      <div class="ct">${cat.icon} ${cat.label.toUpperCase()}</div>
      ${drugList}
    </div>
    <div class="card">
      <div class="ct">FICHE MOLÉCULE</div>
      ${detail}
    </div>
  </div>`;
}

</script>
